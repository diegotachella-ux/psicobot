<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsicoBot — Entrenamiento Clínico</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F3EE;
      --warm-white: #FDFAF7;
      --sage: #6B8F71;
      --sage-light: #E8F0E9;
      --sage-dark: #4A6B50;
      --terracotta: #C17B5C;
      --terracotta-light: #F5E8E0;
      --charcoal: #2C2C2C;
      --gray-mid: #6B6560;
      --gray-light: #C8C2BB;
      --border: #E2DBD3;
      --shadow: rgba(44,44,44,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--charcoal);
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--sage);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .header-text h1 {
      font-family: 'Lora', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--charcoal);
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--gray-mid);
      margin-top: 1px;
      font-weight: 300;
    }

    .badge {
      margin-left: auto;
      background: var(--sage-light);
      color: var(--sage-dark);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 10px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
      color: var(--gray-mid);
    }

    .msg.bot .msg-label  { color: var(--sage-dark); }
    .msg.user .msg-label { color: var(--terracotta); }

    .bubble {
      padding: 13px 17px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      font-family: 'Lora', serif;
      font-weight: 400;
    }

    .msg.bot .bubble {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--charcoal);
    }

    .msg.user .bubble {
      background: var(--sage);
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: none;
      align-self: flex-start;
      align-items: flex-start;
      flex-direction: column;
      gap: 5px;
    }

    .typing.visible { display: flex; }

    .typing-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--sage-dark); }

    .typing-bubble {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--gray-light);
      border-radius: 50%;
      animation: pulse 1.2s ease infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    /* ── Welcome card ── */
    .welcome {
      margin: auto;
      text-align: center;
      max-width: 480px;
      padding: 40px 20px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: var(--sage-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon svg { width: 30px; height: 30px; fill: none; stroke: var(--sage-dark); stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    .welcome h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--gray-mid);
      line-height: 1.7;
      font-weight: 300;
    }

    .welcome em {
      font-style: normal;
      color: var(--sage-dark);
      font-weight: 500;
    }

    .start-btn {
      margin-top: 24px;
      display: inline-block;
      background: var(--sage);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 28px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    .start-btn:hover { background: var(--sage-dark); transform: translateY(-1px); }
    .start-btn:active { transform: translateY(0); }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--warm-white);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.5;
      color: var(--charcoal);
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 16px;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--gray-light); }
    textarea:focus { border-color: var(--sage); }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--sage);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .send-btn:hover:not(:disabled) { background: var(--sage-dark); transform: scale(1.05); }
    .send-btn:disabled { background: var(--gray-light); cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .hint {
      font-size: 11px;
      color: var(--gray-light);
      text-align: center;
      margin-top: 8px;
      font-weight: 300;
    }

    /* ── Links in bot messages ── */
    .bubble a { color: var(--terracotta); text-decoration: underline; }

    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      .messages { padding: 20px 16px; }
      .input-area { padding: 12px 16px 16px; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
    </div>
    <div class="header-text">
      <h1>PsicoBot</h1>
      <p>Entrenamiento clínico en adicciones</p>
    </div>
    <span class="badge">Simulación</span>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages">

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
      </div>
      <h2>Bienvenido/a al entrenamiento</h2>
      <p>Practicá la <em>entrevista clínica</em> con un paciente simulado.<br />Trabajarás casos de consumo de sustancias psicoactivas.</p>
      <button class="start-btn" onclick="startSession()">Iniciar consulta</button>
    </div>

    <!-- Typing indicator (hidden initially) -->
    <div class="typing" id="typing">
      <span class="typing-label">PsicoBot</span>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div class="input-area" id="inputArea" style="display:none;">
    <div class="input-row">
      <textarea
        id="userInput"
        placeholder="Escribí tu intervención como terapeuta..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="hint">Enter para enviar · Shift+Enter para nueva línea</p>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputArea  = document.getElementById('inputArea');
  const typingEl   = document.getElementById('typing');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');

  let history = [];
  let isWaiting = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
    sendBtn.disabled = el.value.trim() === '' || isWaiting;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Terapeuta' : 'PsicoBot';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = linkify(text.replace(/\n/g, '<br>'));

    div.appendChild(label);
    div.appendChild(bubble);

    messagesEl.insertBefore(div, typingEl);
    scrollBottom();
  }

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function setWaiting(val) {
    isWaiting = val;
    sendBtn.disabled = val || inputEl.value.trim() === '';
    inputEl.disabled = val;
    typingEl.classList.toggle('visible', val);
    if (val) scrollBottom();
  }

  async function startSession() {
    document.getElementById('welcome').remove();
    inputArea.style.display = 'block';
    inputEl.focus();

    setWaiting(true);
    try {
      const botMsg = await callAPI([]);
      history.push({ role: 'assistant', content: botMsg });
      addMessage('bot', botMsg);
    } catch(e) {
      addMessage('bot', 'Hubo un error al iniciar la sesión. Recargá la página.');
    } finally {
      setWaiting(false);
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    setWaiting(true);

    try {
      const botMsg = await callAPI(history);
      history.push({ role: 'assistant', content: botMsg });
      addMessage('bot', botMsg);
    } catch(e) {
      addMessage('bot', 'Ocurrió un error. Por favor intentá de nuevo.');
      history.pop();
    } finally {
      setWaiting(false);
      inputEl.focus();
    }
  }

  async function callAPI(messages) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    return data.response;
  }
</script>
</body>
</html>
